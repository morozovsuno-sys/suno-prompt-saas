<script>
(function() {
    // ================== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ==================
    const state = {
        trackName: '',
        genre: '',
        key: '',
        mode: '',
        timeSignature: '4/4',
        moods: [],
        instruments: [],
        bpm: 120,
        additionalDesc: '',
        appMode: 'simple', // simple / advanced / pro
        vocalType: '',
        vocalEmotions: [],
        scaleType: '',
        chordPalette: '',
        currentStructure: '',
        selectedMasteringTags: [],
        stats: {
            totalGenerations: 0
        }
    };

    // ================== ПОДПИСКА ==================
    let isSubscribed = localStorage.getItem('suno_subscribed') === 'true';

    // Элементы подписки
    const subscribeBtn = document.getElementById('subscribeButton');
    const subStatusSpan = document.querySelector('#subscriptionStatus span:last-child');
    const proLockMessage = document.getElementById('proLockMessage');
    const masteringLockMessage = document.getElementById('masteringLockMessage');
    const masteringContent = document.getElementById('masteringContent');
    const upgradeFromLock = document.getElementById('upgradeFromLock');
    const upgradeFromMastering = document.getElementById('upgradeFromMastering');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const advancedSection = document.getElementById('advancedSection');
    const proSection = document.getElementById('proSection');

    // Pro-элементы (могут отсутствовать на странице, если не загружены)
    const vocalOptions = document.querySelectorAll('.vocal-option');
    const vocalEmotionTags = document.querySelectorAll('#vocalEmotionTags .tag');
    const masteringTags = document.querySelectorAll('.mastering-tag');

    // Функция обновления UI подписки
    function updateSubscriptionUI() {
        if (isSubscribed) {
            subStatusSpan.textContent = 'Pro доступен';
            if (subscribeBtn) subscribeBtn.style.display = 'none';
            // Разблокируем Pro-элементы
            vocalOptions.forEach(opt => opt.classList.remove('locked'));
            vocalEmotionTags.forEach(tag => tag.classList.remove('locked'));
            masteringTags.forEach(tag => tag.classList.remove('locked'));
            if (masteringContent) masteringContent.style.display = 'block';
            if (masteringLockMessage) masteringLockMessage.style.display = 'none';
        } else {
            subStatusSpan.textContent = 'Бесплатный режим';
            if (subscribeBtn) subscribeBtn.style.display = 'inline-flex';
            // Блокируем Pro-элементы
            vocalOptions.forEach(opt => opt.classList.add('locked'));
            vocalEmotionTags.forEach(tag => tag.classList.add('locked'));
            masteringTags.forEach(tag => tag.classList.add('locked'));
            if (masteringContent) masteringContent.style.display = 'none';
            if (masteringLockMessage) masteringLockMessage.style.display = 'block';
            // Если активный режим advanced/pro – сбрасываем на simple
            const activeMode = document.querySelector('.mode-btn.active');
            if (activeMode && (activeMode.dataset.mode === 'advanced' || activeMode.dataset.mode === 'pro')) {
                const simpleBtn = document.querySelector('[data-mode="simple"]');
                if (simpleBtn) simpleBtn.click();
            }
        }
    }

    function upgrade() {
        localStorage.setItem('suno_subscribed', 'true');
        isSubscribed = true;
        updateSubscriptionUI();
        showToast('✅ Подписка оформлена!');
    }

    if (subscribeBtn) subscribeBtn.addEventListener('click', upgrade);
    if (upgradeFromLock) upgradeFromLock.addEventListener('click', upgrade);
    if (upgradeFromMastering) upgradeFromMastering.addEventListener('click', upgrade);

    // ================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ==================
    modeBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            const mode = this.dataset.mode;
            if ((mode === 'advanced' || mode === 'pro') && !isSubscribed) {
                if (proLockMessage) proLockMessage.style.display = 'block';
                showToast('💎 Оформите подписку для доступа к Pro-функциям', true);
                return;
            }
            if (proLockMessage) proLockMessage.style.display = 'none';

            modeBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.appMode = mode;

            if (advancedSection && proSection) {
                if (mode === 'simple') {
                    advancedSection.style.display = 'none';
                    proSection.style.display = 'none';
                } else if (mode === 'advanced') {
                    advancedSection.style.display = 'block';
                    proSection.style.display = 'none';
                } else if (mode === 'pro') {
                    advancedSection.style.display = 'block';
                    proSection.style.display = 'block';
                }
            }
        });
    });

    // ================== ЗАГРУЗКА ЭЛЕМЕНТОВ DOM ==================
    const trackNameInput = document.getElementById('trackName');
    const mainGenreSelect = document.getElementById('mainGenre');
    const keySignatureSelect = document.getElementById('keySignature');
    const modeSignatureSelect = document.getElementById('modeSignature');
    const timeSignatureSelect = document.getElementById('timeSignature');
    const moodTags = document.querySelectorAll('#moodTags .tag');
    const instrumentTags = document.querySelectorAll('#instrumentTags .tag');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValue = document.getElementById('bpmValue');
    const additionalDescInput = document.getElementById('additionalDesc');
    const generateBtn = document.getElementById('generateBtn');
    const styleResult = document.getElementById('styleResult');
    const lyricsResult = document.getElementById('lyricsResult');
    const masteringResult = document.getElementById('masteringResult');
    const fullResult = document.getElementById('fullResult');
    const randomizeBtn = document.getElementById('randomizeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const scaleTypeSelect = document.getElementById('scaleType');
    const chordPaletteInput = document.getElementById('chordPalette');
    const currentStructure = document.getElementById('currentStructure');
    const clearStructureBtn = document.getElementById('clearStructureBtn');
    const copyStructureBtn = document.getElementById('copyStructureBtn');
    const selectedMasteringResult = document.getElementById('selectedMasteringResult');
    const selectedCount = document.getElementById('selectedCount');
    const clearMasteringBtn = document.getElementById('clearMasteringBtn');
    const masteringSearch = document.getElementById('masteringSearch');
    const totalGenerationsStat = document.getElementById('totalGenerationsStat');

    // ================== ОБРАБОТЧИКИ ВВОДА ==================
    if (trackNameInput) {
        trackNameInput.addEventListener('input', e => state.trackName = e.target.value);
    }
    if (mainGenreSelect) {
        mainGenreSelect.addEventListener('change', e => state.genre = e.target.value);
    }
    if (keySignatureSelect) {
        keySignatureSelect.addEventListener('change', e => state.key = e.target.value);
    }
    if (modeSignatureSelect) {
        modeSignatureSelect.addEventListener('change', e => state.mode = e.target.value);
    }
    if (timeSignatureSelect) {
        timeSignatureSelect.addEventListener('change', e => state.timeSignature = e.target.value);
    }
    if (bpmSlider && bpmValue) {
        bpmSlider.addEventListener('input', e => {
            state.bpm = +e.target.value;
            bpmValue.textContent = `${state.bpm} BPM`;
        });
    }
    if (additionalDescInput) {
        additionalDescInput.addEventListener('input', e => state.additionalDesc = e.target.value);
    }
    if (scaleTypeSelect) {
        scaleTypeSelect.addEventListener('change', e => state.scaleType = e.target.value);
    }
    if (chordPaletteInput) {
        chordPaletteInput.addEventListener('input', e => state.chordPalette = e.target.value);
    }

    // ================== ТЕГИ НАСТРОЕНИЯ ==================
    moodTags.forEach(tag => {
        tag.addEventListener('click', function() {
            this.classList.toggle('active');
            const val = this.dataset.value;
            if (state.moods.includes(val)) {
                state.moods = state.moods.filter(v => v !== val);
            } else {
                state.moods.push(val);
            }
        });
    });

    // ================== ТЕГИ ИНСТРУМЕНТОВ ==================
    instrumentTags.forEach(tag => {
        tag.addEventListener('click', function() {
            this.classList.toggle('active');
            const val = this.dataset.value;
            if (state.instruments.includes(val)) {
                state.instruments = state.instruments.filter(v => v !== val);
            } else {
                state.instruments.push(val);
            }
        });
    });

    // ================== ВОКАЛ (PRO) ==================
    vocalOptions.forEach(opt => {
        opt.addEventListener('click', function(e) {
            if (!isSubscribed) {
                e.preventDefault();
                showToast('🔒 Доступно только в Pro', true);
                return;
            }
            vocalOptions.forEach(o => o.classList.remove('active'));
            this.classList.add('active');
            state.vocalType = this.dataset.value;
        });
    });

    vocalEmotionTags.forEach(tag => {
        tag.addEventListener('click', function(e) {
            if (!isSubscribed) {
                e.preventDefault();
                showToast('🔒 Доступно только в Pro', true);
                return;
            }
            this.classList.toggle('active');
            const val = this.dataset.value;
            if (state.vocalEmotions.includes(val)) {
                state.vocalEmotions = state.vocalEmotions.filter(v => v !== val);
            } else {
                state.vocalEmotions.push(val);
            }
        });
    });

    // ================== МАСТЕРИНГ ТЕГИ (PRO) ==================
    masteringTags.forEach(tag => {
        tag.addEventListener('click', function(e) {
            if (!isSubscribed) {
                e.preventDefault();
                showToast('🔒 Доступно только в Pro', true);
                return;
            }
            const val = this.dataset.value;
            const idx = state.selectedMasteringTags.indexOf(val);
            if (idx > -1) {
                state.selectedMasteringTags.splice(idx, 1);
                this.classList.remove('active');
            } else {
                state.selectedMasteringTags.push(val);
                this.classList.add('active');
            }
            updateMasteringDisplay();
        });
    });

    function updateMasteringDisplay() {
        if (selectedCount) selectedCount.textContent = state.selectedMasteringTags.length;
        const display = state.selectedMasteringTags.length ? state.selectedMasteringTags.join(' ') : 'Выберите теги выше';
        if (selectedMasteringResult) selectedMasteringResult.textContent = display;
        if (masteringResult) masteringResult.textContent = display;
    }

    if (clearMasteringBtn) {
        clearMasteringBtn.addEventListener('click', () => {
            state.selectedMasteringTags = [];
            masteringTags.forEach(t => t.classList.remove('active'));
            updateMasteringDisplay();
            showToast('🗑️ Мастеринг теги очищены');
        });
    }

    if (masteringSearch) {
        masteringSearch.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            masteringTags.forEach(tag => {
                tag.style.display = tag.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });
    }

    // ================== СТРУКТУРА ==================
    document.querySelectorAll('.structure-item').forEach(item => {
        item.addEventListener('click', () => {
            const tag = item.dataset.tag;
            state.currentStructure = state.currentStructure ? state.currentStructure + '\n' + tag : tag;
            if (currentStructure) currentStructure.textContent = state.currentStructure;
            if (lyricsResult) lyricsResult.textContent = state.currentStructure;
            showToast(`✅ Тег ${tag} добавлен`);
        });
    });

    if (clearStructureBtn) {
        clearStructureBtn.addEventListener('click', () => {
            state.currentStructure = '';
            if (currentStructure) currentStructure.textContent = 'Пусто. Кликните на теги выше.';
            if (lyricsResult) lyricsResult.textContent = 'Пусто. Кликните на теги в разделе "Структура".';
            showToast('🗑️ Структура очищена');
        });
    }

    if (copyStructureBtn) {
        copyStructureBtn.addEventListener('click', () => {
            if (state.currentStructure) {
                navigator.clipboard.writeText(state.currentStructure);
                showToast('✅ Скопировано');
            } else {
                showToast('⚠️ Нечего копировать', true);
            }
        });
    }

    // ================== ГЕНЕРАЦИЯ ПРОМТА ==================
    function generatePrompt() {
        const parts = [];

        if (state.genre) parts.push(state.genre);
        if (state.key && state.mode) parts.push(`${state.key} ${state.mode}`);
        if (state.moods.length) parts.push(...state.moods);
        if (state.instruments.length) parts.push(...state.instruments);
        parts.push(`${state.bpm} BPM`);
        if (state.timeSignature && state.timeSignature !== '4/4') parts.push(state.timeSignature);

        if (state.appMode === 'advanced' || state.appMode === 'pro') {
            if (state.vocalType) parts.push(state.vocalType);
            if (state.vocalEmotions.length) parts.push(...state.vocalEmotions);
        }
        if (state.appMode === 'pro') {
            if (state.scaleType) parts.push(`scale: ${state.scaleType}`);
            if (state.chordPalette) parts.push(`chords: ${state.chordPalette}`);
        }
        if (state.additionalDesc) parts.push(state.additionalDesc);

        const stylePrompt = parts.join(', ') || 'Выберите параметры для генерации';
        if (styleResult) styleResult.textContent = stylePrompt;

        const full = state.trackName
            ? `Title: ${state.trackName}\n\nStyle: ${stylePrompt}\n\nStructure:\n${state.currentStructure || '(пусто)'}\n\nMastering: ${state.selectedMasteringTags.join(' ') || '(пуsto)'}`
            : `${stylePrompt}\n\nStructure:\n${state.currentStructure || '(пусто)'}\n\nMastering: ${state.selectedMasteringTags.join(' ') || '(пусто)'}`;
        if (fullResult) fullResult.textContent = full;

        if (parts.length > 0) {
            state.stats.totalGenerations++;
            localStorage.setItem('totalGenerations', state.stats.totalGenerations);
            if (totalGenerationsStat) totalGenerationsStat.textContent = state.stats.totalGenerations;
            showToast('✅ Промт сгенерирован');
        } else {
            showToast('⚠️ Выберите хотя бы один параметр', true);
        }
    }

    if (generateBtn) generateBtn.addEventListener('click', generatePrompt);

    // ================== СЛУЧАЙНЫЙ ВЫБОР ==================
    if (randomizeBtn) {
        randomizeBtn.addEventListener('click', () => {
            const genres = ['Electronic', 'Pop', 'Rock', 'Hip Hop', 'Jazz', 'Ambient'];
            const keys = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const modes = ['major', 'minor', 'lydian', 'phrygian', 'dorian', 'mixolydian'];
            const moods = ['Energetic', 'Melancholic', 'Romantic', 'Dark', 'Uplifting', 'Chill', 'Dreamy', 'Epic'];
            const instruments = ['Piano', 'Guitar', 'Synthesizer', 'Drums', 'Bass', 'Strings', '808', 'Arpeggio', 'Pads'];

            state.genre = genres[Math.floor(Math.random() * genres.length)];
            if (mainGenreSelect) mainGenreSelect.value = state.genre;

            state.key = keys[Math.floor(Math.random() * keys.length)];
            if (keySignatureSelect) keySignatureSelect.value = state.key;

            state.mode = modes[Math.floor(Math.random() * modes.length)];
            if (modeSignatureSelect) modeSignatureSelect.value = state.mode;

            // Сброс старых активных тегов
            moodTags.forEach(t => t.classList.remove('active'));
            instrumentTags.forEach(t => t.classList.remove('active'));

            state.moods = [];
            const moodCount = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < moodCount; i++) {
                const rm = moods[Math.floor(Math.random() * moods.length)];
                if (!state.moods.includes(rm)) {
                    state.moods.push(rm);
                    const tag = Array.from(moodTags).find(t => t.dataset.value === rm);
                    if (tag) tag.classList.add('active');
                }
            }

            state.instruments = [];
            const instCount = Math.floor(Math.random() * 4) + 2;
            for (let i = 0; i < instCount; i++) {
                const ri = instruments[Math.floor(Math.random() * instruments.length)];
                if (!state.instruments.includes(ri)) {
                    state.instruments.push(ri);
                    const tag = Array.from(instrumentTags).find(t => t.dataset.value === ri);
                    if (tag) tag.classList.add('active');
                }
            }

            state.bpm = Math.floor(Math.random() * 100) + 70;
            if (bpmSlider) bpmSlider.value = state.bpm;
            if (bpmValue) bpmValue.textContent = state.bpm + ' BPM';

            const descs = [
                'Powerful vocals, emotional delivery',
                'Instrumental, cinematic atmosphere',
                'Female ethereal vocals, dreamy',
                'Upbeat, perfect for dancing',
                'Relaxing, meditation music',
                '80s style, nostalgic synth sounds'
            ];
            state.additionalDesc = descs[Math.floor(Math.random() * descs.length)];
            if (additionalDescInput) additionalDescInput.value = state.additionalDesc;

            showToast('🎲 Случайные параметры выбраны');
        });
    }

    // ================== ОЧИСТКА ВСЕГО ==================
    if (clearBtn) {
        clearBtn.addEventListener('click', () => {
            state.trackName = '';
            state.genre = '';
            state.key = '';
            state.mode = '';
            state.timeSignature = '4/4';
            state.moods = [];
            state.instruments = [];
            state.bpm = 120;
            state.additionalDesc = '';
            state.vocalType = '';
            state.vocalEmotions = [];
            state.scaleType = '';
            state.chordPalette = '';
            state.currentStructure = '';
            state.selectedMasteringTags = [];

            if (trackNameInput) trackNameInput.value = '';
            if (mainGenreSelect) mainGenreSelect.value = '';
            if (keySignatureSelect) keySignatureSelect.value = '';
            if (modeSignatureSelect) modeSignatureSelect.value = '';
            if (timeSignatureSelect) timeSignatureSelect.value = '4/4';
            moodTags.forEach(t => t.classList.remove('active'));
            instrumentTags.forEach(t => t.classList.remove('active'));
            if (bpmSlider) bpmSlider.value = 120;
            if (bpmValue) bpmValue.textContent = '120 BPM';
            if (additionalDescInput) additionalDescInput.value = '';
            vocalOptions.forEach(o => o.classList.remove('active'));
            vocalEmotionTags.forEach(t => t.classList.remove('active'));
            if (scaleTypeSelect) scaleTypeSelect.value = '';
            if (chordPaletteInput) chordPaletteInput.value = '';
            masteringTags.forEach(t => t.classList.remove('active'));

            updateMasteringDisplay();

            if (styleResult) styleResult.textContent = 'Выберите параметры и нажмите "Сгенерировать"';
            if (lyricsResult) lyricsResult.textContent = 'Пусто. Кликните на теги в разделе "Структура".';
            if (fullResult) fullResult.textContent = '--';
            if (currentStructure) currentStructure.textContent = 'Пусто. Кликните на теги выше.';

            showToast('🗑️ Все параметры очищены');
        });
    }

    // ================== КОПИРОВАНИЕ ==================
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const targetId = this.dataset.target;
            const target = document.getElementById(targetId);
            if (target && target.textContent && !target.textContent.includes('Пусто') && !target.textContent.includes('Выберите')) {
                navigator.clipboard.writeText(target.textContent).then(() => {
                    this.classList.add('copied');
                    setTimeout(() => this.classList.remove('copied'), 1500);
                    showToast('✅ Скопировано');
                }).catch(() => showToast('❌ Ошибка копирования', true));
            } else {
                showToast('⚠️ Нечего копировать', true);
            }
        });
    });

    // ================== ПРИМЕРЫ ==================
    document.querySelectorAll('.example-card').forEach(card => {
        card.addEventListener('click', function() {
            try {
                const example = JSON.parse(this.dataset.example);
                // Загрузка примера (упрощённо, можно расширить)
                if (mainGenreSelect && example.genre) {
                    mainGenreSelect.value = example.genre;
                    state.genre = example.genre;
                }
                // ... при желании добавить загрузку остальных полей
                showToast('✅ Пример загружен (базовый)');
            } catch (e) {
                showToast('❌ Ошибка загрузки примера', true);
            }
        });
    });

    // ================== НАВИГАЦИЯ ПО ВКЛАДКАМ ==================
    const navTabs = document.querySelectorAll('.nav-tab');
    const sections = document.querySelectorAll('.section');
    navTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            navTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            sections.forEach(s => {
                s.classList.remove('active');
                if (s.id === tab.dataset.section) s.classList.add('active');
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });

    // ================== TOAST ==================
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMessage');
        if (!toast || !toastMsg) return;
        toastMsg.textContent = msg;
        toast.classList.toggle('error', isError);
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ================== СТАТИСТИКА ==================
    const savedGen = localStorage.getItem('totalGenerations');
    if (savedGen) {
        state.stats.totalGenerations = parseInt(savedGen);
        if (totalGenerationsStat) totalGenerationsStat.textContent = savedGen;
    }

    // Инициализация подписки
    updateSubscriptionUI();
})();
</script>
